<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collide — Summer's Room</title>
  <style>
    :root {
      --navy: #1b3a6b;
      --ice: #a8c4e0;
      --cream: #faf7f2;
      --text: #1a1a2e;
      --red: #c0392b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #08131e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      overflow: hidden;
    }

    header {
      text-align: center;
      margin-bottom: 18px;
      position: relative;
      z-index: 10;
    }

    .title {
      font-size: 28px;
      font-style: italic;
      letter-spacing: 8px;
      color: var(--ice);
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(168,196,224,0.4);
      text-transform: uppercase;
      margin-top: 5px;
      font-family: sans-serif;
    }

    /* ── 3D SCENE WRAPPER ── */
    .scene {
      position: relative;
      width: 900px;
      height: 580px;
      perspective: 900px;
      cursor: crosshair;
    }

    /* The card that rotates in 3D */
    .card {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform 0.08s ease-out;
      border-radius: 6px;
      overflow: hidden;
      box-shadow:
        0 0 0 14px #1a2d42,
        0 0 0 16px #263c54,
        0 30px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(100,160,220,0.15);
    }

    /* ── LAYERS ── */
    .layer {
      position: absolute;
      inset: -30px; /* bleed so edges don't show on tilt */
      background-size: cover;
      background-position: center;
    }

    /* Base room image */
    .layer-bg {
      background-image: url('dorm.png');
      transform: translateZ(0px);
    }

    /* Subtle dark vignette */
    .layer-vignette {
      background: radial-gradient(ellipse 90% 80% at 50% 50%, transparent 40%, rgba(8,19,30,0.55) 100%);
      transform: translateZ(2px);
      pointer-events: none;
    }

    /* Ambient warm glow over desk area */
    .layer-glow {
      background: radial-gradient(ellipse 350px 280px at 68% 52%, rgba(245,220,120,0.18) 0%, transparent 70%);
      transform: translateZ(3px);
      pointer-events: none;
    }

    /* Dust particles layer */
    .layer-dust {
      transform: translateZ(8px);
      pointer-events: none;
    }

    /* ── HOTSPOTS ── */
    .spot {
      position: absolute;
      cursor: pointer;
      z-index: 50;
      border-radius: 50%;
      transform: translateZ(20px);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    /* Invisible click area with visible pulse ring */
    .spot-inner {
      position: relative;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spot-ring {
      position: absolute;
      inset: 0;
      border: 2px solid rgba(168,196,224,0.7);
      border-radius: 50%;
      animation: ringPulse 2.5s ease-in-out infinite;
    }

    .spot-dot {
      width: 10px;
      height: 10px;
      background: rgba(168,196,224,0.9);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(168,196,224,0.8);
    }

    .spot:hover .spot-ring {
      border-color: white;
      animation: none;
    }

    .spot:hover .spot-dot {
      background: white;
      box-shadow: 0 0 14px white;
    }

    @keyframes ringPulse {
      0%   { transform: scale(1);   opacity: 0.8; }
      50%  { transform: scale(1.5); opacity: 0; }
      100% { transform: scale(1);   opacity: 0.8; }
    }

    /* Tooltip */
    .spot::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(27,58,107,0.96);
      color: var(--ice);
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      font-family: sans-serif;
    }

    .spot:hover::after { opacity: 1; }

    /* ── DUST PARTICLES ── */
    .dust {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255,255,220,0.6);
      border-radius: 50%;
      animation: float var(--d, 8s) ease-in-out infinite;
      animation-delay: var(--dl, 0s);
    }

    @keyframes float {
      0%   { transform: translate(0, 0);        opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translate(var(--tx, 20px), var(--ty, -60px)); opacity: 0; }
    }

    /* ── HINT ── */
    .hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateZ(25px);
      color: rgba(168,196,224,0.45);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: sans-serif;
      pointer-events: none;
      white-space: nowrap;
      animation: breathe 4s ease infinite;
      z-index: 60;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.75; }
    }

    /* ── MODAL ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(8,19,30,0.88);
      z-index: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--cream);
      width: 440px;
      max-width: 92vw;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 28px 80px rgba(0,0,0,0.65);
      transform: translateY(28px) scale(0.94);
      transition: transform 0.34s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-head {
      background: var(--navy);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-head-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-icon { font-size: 20px; }

    .modal-title {
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--ice);
      font-family: sans-serif;
    }

    .modal-close {
      background: none;
      border: none;
      color: rgba(168,196,224,0.55);
      font-size: 24px;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }

    .modal-close:hover { color: white; }
    .modal-body { padding: 26px; }

    .tag {
      display: inline-block;
      background: var(--navy);
      color: var(--ice);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 3px 11px;
      border-radius: 20px;
      margin-bottom: 16px;
      font-family: sans-serif;
    }

    .quote {
      font-style: italic;
      font-size: 17px;
      line-height: 1.78;
      color: #1a2a40;
      border-left: 3px solid var(--ice);
      padding-left: 18px;
    }

    .schedule {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 2.1;
      background: #f0f4f8;
      padding: 18px 20px;
      border-radius: 6px;
      border-left: 3px solid var(--navy);
      color: var(--text);
    }

    .schedule .t { color: var(--navy); font-weight: bold; }
    .schedule .s { text-decoration: line-through; opacity: 0.4; }

    .prose { font-size: 14px; line-height: 1.82; color: #1a2a40; }
    .prose .hl { color: var(--navy); font-weight: bold; }

    .sticky {
      background: #fefce8;
      padding: 16px;
      border-radius: 5px;
      font-family: 'Courier New', monospace;
      font-size: 12.5px;
      line-height: 1.7;
      transform: rotate(-1.2deg);
      box-shadow: 2px 2px 8px rgba(0,0,0,0.12);
      margin-top: 14px;
    }

    .imessages { display: flex; flex-direction: column; gap: 12px; }
    .mw { display: flex; flex-direction: column; }
    .mw.r { align-items: flex-end; }
    .mw.l { align-items: flex-start; }

    .mn {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(0,0,0,0.38);
      margin-bottom: 3px;
      font-family: sans-serif;
    }

    .mb {
      max-width: 78%;
      padding: 10px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.45;
      font-family: sans-serif;
    }

    .mb.recv { background: #e5e5ea; color: #1c1c1e; border-bottom-left-radius: 5px; }
    .mb.sent { background: var(--navy); color: white; border-bottom-right-radius: 5px; }

    .egg {
      font-style: italic;
      font-size: 15px;
      line-height: 1.82;
      color: var(--red);
      text-align: center;
      padding: 6px 0;
    }
  </style>
</head>
<body>

<header>
  <div class="title">Collide</div>
  <div class="subtitle">Summer's Room &mdash; Explore her world</div>
</header>

<div class="scene" id="scene">
  <div class="card" id="card">

    <!-- Layer 0: room image -->
    <div class="layer layer-bg"></div>

    <!-- Layer 1: vignette depth -->
    <div class="layer layer-vignette"></div>

    <!-- Layer 2: warm lamp glow -->
    <div class="layer layer-glow"></div>

    <!-- Layer 3: floating dust -->
    <div class="layer layer-dust" id="dust"></div>

    <!-- ── HOTSPOTS ──
         Positions are % of the scene (900×580).
         Adjust left/top if they don't align with your image. -->

    <!-- Window -->
    <div class="spot" style="left:47%;top:8%" data-tip="The Window" onclick="open_('window')">
      <div class="spot-inner"><div class="spot-ring"></div><div class="spot-dot"></div></div>
    </div>

    <!-- Pinboard -->
    <div class="spot" style="left:22%;top:12%" data-tip="Her Pinboard" onclick="open_('pinboard')">
      <div class="spot-inner"><div class="spot-ring"></div><div class="spot-dot"></div></div>
    </div>

    <!-- Bookshelf -->
    <div class="spot" style="left:10%;top:42%" data-tip="Her Bookshelf" onclick="open_('shelf')">
      <div class="spot-inner"><div class="spot-ring"></div><div class="spot-dot"></div></div>
    </div>

    <!-- Lamp -->
    <div class="spot" style="left:72%;top:32%" data-tip="Her Lamp" onclick="open_('lamp')">
      <div class="spot-inner"><div class="spot-ring"></div><div class="spot-dot"></div></div>
    </div>

    <!-- Notebook / Planner -->
    <div class="spot" style="left:58%;top:52%" data-tip="Her Planner" onclick="open_('notebook')">
      <div class="spot-inner"><div class="spot-ring"></div><div class="spot-dot"></div></div>
    </div>

    <!-- Phone -->
    <div class="spot" style="left:66%;top:54%" data-tip="Her Phone" onclick="open_('phone')">
      <div class="spot-inner"><div class="spot-ring"></div><div class="spot-dot"></div></div>
    </div>

    <!-- Glasses -->
    <div class="spot" style="left:75%;top:55%" data-tip="Her Glasses" onclick="open_('glasses')">
      <div class="spot-inner"><div class="spot-ring"></div><div class="spot-dot"></div></div>
    </div>

    <!-- Bed -->
    <div class="spot" style="left:20%;top:62%" data-tip="Her Bed" onclick="open_('bed')">
      <div class="spot-inner"><div class="spot-ring"></div><div class="spot-dot"></div></div>
    </div>

    <!-- Jersey (easter egg — tucked away) -->
    <div class="spot" style="left:88%;top:60%" data-tip="What's this...?" onclick="open_('jersey')">
      <div class="spot-inner"><div class="spot-ring"></div><div class="spot-dot"></div></div>
    </div>

    <div class="hint">move your mouse &mdash; click the circles to explore</div>
  </div>
</div>

<!-- ── MODAL ── -->
<div class="overlay" id="overlay" onclick="closeOut(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-left">
        <span class="modal-icon" id="mIcon"></span>
        <span class="modal-title" id="mTitle"></span>
      </div>
      <button class="modal-close" onclick="close_()">×</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<script>
// ── MODAL CONTENT ──
const reveals = {
  window: {
    icon: '🌙', title: 'The Window',
    html: `
      <div class="tag">Night View</div>
      <div class="quote">
        "She could see the rink from here — the distant blue-white glow cutting through the dark. Two years she had spent learning to look past it.<br><br>
        Tonight, for the first time, she didn't look away."
      </div>`
  },
  pinboard: {
    icon: '📌', title: 'Her Pinboard',
    html: `
      <div class="tag">Summer's Goals</div>
      <div class="prose">
        <p>Behind the grad school draft, pinned crooked — the only crooked thing in the room — is a sticky note in blue ballpoint:</p>
      </div>
      <div class="sticky">
        <strong>Things that will NOT derail me:</strong><br>
        — bad weather<br>
        — group projects<br>
        — unreliable lab subjects<br>
        — <span style="text-decoration:line-through;opacity:0.45">hockey players</span>
      </div>`
  },
  shelf: {
    icon: '📚', title: 'Her Bookshelf',
    html: `
      <div class="tag">Reading List</div>
      <div class="prose">
        <p>The psychology spines are worn flat, dog-eared, annotated in her neat, unforgiving hand.</p>
        <br>
        <p><span class="hl">Sport Psychology: Theory &amp; Practice</span> — flagged on page 214: <em>"The athlete's greatest opponent lives between their ears."</em></p>
        <br>
        <p>Wedged between two textbooks: a battered copy of <em>Pride and Prejudice</em>. No annotations. Just fingerprints on page one and page three hundred and twelve.</p>
        <br>
        <p style="opacity:0.55;font-size:13px;font-style:italic">She'd deny it if you asked.</p>
      </div>`
  },
  bed: {
    icon: '🌙', title: 'Her Bed',
    html: `
      <div class="tag">10:52 PM</div>
      <div class="quote">
        "She had a plan for the year. A tight, precise, color-coded plan.<br><br>
        It did not include lying awake at eleven thinking about the way he looked at her across the ice — not at her research clipboard, not past her.<br><br>
        At her."
      </div>`
  },
  jersey: {
    icon: '🏒', title: '...Wait.',
    html: `
      <div class="tag">Easter Egg</div>
      <div class="egg">
        A red jersey. Number 7.<br>
        Folded. <em>Of course</em> it's folded.<br><br>
        <em>"It was just easier than giving it back.<br>That's all."</em><br><br>
        <span style="font-size:12px;opacity:0.55;font-style:normal">She had said that to herself four times this week.</span>
      </div>`
  },
  glasses: {
    icon: '👓', title: 'Her Glasses',
    html: `
      <div class="tag">Character Note</div>
      <div class="quote">
        "She saw everything clearly.<br><br>
        Data. Patterns. The way people gave themselves away under observation.<br><br>
        Aiden Crawford, she had decided on day one, was an open book.<br><br>
        She was wrong about that."
      </div>`
  },
  phone: {
    icon: '📱', title: 'Her Phone',
    html: `
      <div class="tag">New Message</div>
      <div class="imessages">
        <div class="mw r">
          <div class="mn">Summer</div>
          <div class="mb sent">I need you to complete the behavioral questionnaire by Thursday. All 47 questions.</div>
        </div>
        <div class="mw l">
          <div class="mn">Crawford #7</div>
          <div class="mb recv">47?? is this a study or a trial</div>
        </div>
        <div class="mw r">
          <div class="mn">Summer</div>
          <div class="mb sent">It's for science. Thursday.</div>
        </div>
        <div class="mw l">
          <div class="mn">Crawford #7</div>
          <div class="mb recv">what if I have questions for you</div>
        </div>
        <div class="mw r">
          <div class="mn">Summer</div>
          <div class="mb sent">You don't.</div>
        </div>
        <div class="mw l">
          <div class="mn">Crawford #7</div>
          <div class="mb recv">favorite color</div>
        </div>
        <div class="mw r">
          <div class="mn">Summer</div>
          <div class="mb sent">Thursday, Crawford.</div>
        </div>
      </div>`
  },
  notebook: {
    icon: '📓', title: 'Her Planner',
    html: `
      <div class="tag">This Week</div>
      <div class="schedule">
        <span class="t">MON</span> — Lecture, research session, library 6–9<br>
        <span class="t">TUE</span> — Office hours, <span class="s">avoid the rink</span> study group<br>
        <span class="t">WED</span> — Subject observation (rink, 7 PM) ⚠<br>
        <span class="t">THU</span> — Questionnaire due from Crawford<br>
        <span class="t">FRI</span> — Data analysis, grad app draft<br>
        <span class="t">SAT</span> — <span class="s">nothing</span> more research<br>
        <span class="t">SUN</span> — Everything I didn't finish
      </div>`
  },
  lamp: {
    icon: '🕯️', title: 'Late Night',
    html: `
      <div class="tag">2:14 AM</div>
      <div class="quote">
        "The lamp was the only light on in the building at this hour. She liked it that way — the quiet, just her and the data.<br><br>
        She did not like that she kept losing her place in the spreadsheet.<br><br>
        She did not like what she was losing it to."
      </div>`
  }
};

function open_(key) {
  const d = reveals[key];
  if (!d) return;
  document.getElementById('mIcon').textContent  = d.icon;
  document.getElementById('mTitle').textContent = d.title;
  document.getElementById('mBody').innerHTML    = d.html;
  document.getElementById('overlay').classList.add('open');
}

function close_() { document.getElementById('overlay').classList.remove('open'); }
function closeOut(e) { if (e.target === document.getElementById('overlay')) close_(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') close_(); });

// ── 3D MOUSE PARALLAX ──
const scene = document.getElementById('scene');
const card  = document.getElementById('card');
const MAX_TILT = 12; // degrees

scene.addEventListener('mousemove', e => {
  const r   = scene.getBoundingClientRect();
  const x   = (e.clientX - r.left)  / r.width  - 0.5; // -0.5 to 0.5
  const y   = (e.clientY - r.top)   / r.height - 0.5;
  const rX  =  y * MAX_TILT * -1;
  const rY  =  x * MAX_TILT;
  card.style.transform = `rotateX(${rX}deg) rotateY(${rY}deg)`;
});

scene.addEventListener('mouseleave', () => {
  card.style.transition = 'transform 0.6s ease-out';
  card.style.transform  = 'rotateX(0deg) rotateY(0deg)';
  setTimeout(() => { card.style.transition = 'transform 0.08s ease-out'; }, 650);
});

// ── FLOATING DUST PARTICLES ──
const dustLayer = document.getElementById('dust');
for (let i = 0; i < 22; i++) {
  const d = document.createElement('div');
  d.className = 'dust';
  const tx = (Math.random() - 0.5) * 60;
  const ty = -(30 + Math.random() * 80);
  d.style.cssText = `
    left:${20 + Math.random() * 60}%;
    top:${30 + Math.random() * 50}%;
    --d:${6 + Math.random() * 8}s;
    --dl:${(Math.random() * 6).toFixed(1)}s;
    --tx:${tx.toFixed(0)}px;
    --ty:${ty.toFixed(0)}px;
    opacity:${0.3 + Math.random() * 0.5};
    width:${Math.random() < 0.3 ? 3 : 2}px;
    height:${Math.random() < 0.3 ? 3 : 2}px;
  `;
  dustLayer.appendChild(d);
}
</script>
</body>
</html>
